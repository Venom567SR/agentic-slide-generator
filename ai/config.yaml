models:
  fast: gemini-2.5-flash
  pro: gemini-2.5-pro
  image: gemini-2.5-flash-image

slide_count: 10

modes:
  fast:
    use_images: false
    research_first: false
    active_agents:
      - intent_detector
      - manager
      - context_retriever
      - web_search
      - ppt_generator

  pro:
    use_images: true
    research_first: false
    active_agents:
      - intent_detector
      - manager
      - context_retriever
      - web_search
      - ppt_generator
      - image_generator

  max:
    use_images: true
    research_first: true
    active_agents:
      - research
      - intent_detector
      - manager
      - context_retriever
      - web_search
      - ppt_generator
      - image_generator
